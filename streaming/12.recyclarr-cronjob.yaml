#
# Sonarr deployment
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recyclarr
  namespace: streaming
  labels:
    app: recyclarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recyclarr
  template:
    metadata:
      labels:
        app: recyclarr
    spec:
      dnsPolicy: "None"
      dnsConfig:
        nameservers:
          - ${NAME_SERVER_IP}
        searches:
        - default.svc.cluster.local
        - svc.cluster.local
        - cluster.local
      containers:
      - name: sonarr
        image: ghcr.io/recyclarr/recyclarr:latest
        ports:
        - containerPort: 8081
        env:
        - name: RECYCLARR_CONFIG_DIR
          value: "/mnt/recyclarr/config"
        - name: RECYCLARR_DATA_DIR
          value: "/mnt/recyclarr/data"
        - name: TZ
          value: "America/New_York"
        volumeMounts:
        - name: recyclarr-config
          mountPath: /mnt/recyclarr
      volumes:
      - name: recyclarr-config
        hostPath:
          path: /home/dasilvam/projects/kube-provisions/streaming/recyclarr
          type: Directory
---
#
# Sonarr Node Port
#
apiVersion: v1
kind: Service
metadata:
  name: recyclarr-node
  namespace: streaming
spec:
  type: NodePort
  selector:
    app: recyclarr
  ports:
  - port: 8081
    targetPort: 8081



