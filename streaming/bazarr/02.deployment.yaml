
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bazarr
  namespace: streaming
  labels:
    app: bazarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bazarr
  template:
    metadata:
      labels:
        app: bazarr
    spec:
      securityContext:
          runAsUser: 1000
          runAsGroup: 1002
      dnsPolicy: "None"
      dnsConfig:
        nameservers:
        - ${NAME_SERVER_IP}
        searches:
        - default.svc.cluster.local
        - svc.cluster.local
        - cluster.local
      containers:
      - name: bazarr
        image: linuxserver/bazarr:development
        securityContext:
          runAsUser: 1000
          runAsGroup: 1002
        ports:
        - containerPort: 6767
          name: http
        env:
        - name: TZ
          value: "America/New_York"
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1002"
        volumeMounts:
        - name: config
          mountPath: /config
        - name: nas-media
          mountPath: /mnt/data/media
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: bazarr-config-pvc
      - name: nas-media
        persistentVolumeClaim:
          claimName: nas-media-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: bazarr-nodeport
  namespace: streaming
spec:
  type: NodePort
  selector:
    app: bazarr
  ports:
  - port: 6767
    targetPort: 6767
    nodePort: 30676
---
apiVersion: v1
kind: Service
metadata:
  name: bazarr
  namespace: streaming
spec:
  type: LoadBalancer
  selector:
    app: bazarr
  ports:
  - port: 80
    targetPort: 6767