loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    bucketNames:
      chunks: loki-chunks
      ruler: loki-ruler
      admin: loki-admin
    s3:
      endpoint: loki-minio.monitoring.svc.cluster.local:9000
      region: null
      accessKeyId: ${ACCESS_KEY_ID}
      secretAccessKey: ${SECRET_ACCESS_KEY}
      s3ForcePathStyle: true
      insecure: true
  schemaConfig:
    configs:
      - from: "2026-04-07"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
  ruler:
    enable_api: true

# Enable distributed components
write:
  replicas: 1
  persistence:
    enabled: true
    size: 10Gi

read:
  replicas: 1

backend:
  replicas: 1
  persistence:
    enabled: true
    size: 10Gi

# Don't set anything else to 0
# Remove singleBinary section entirely

compactor:
  retention_enabled: true
  retention_delete_delay: 336h
  compaction_interval: 1h

minio:
  enabled: true
  rootUser: ${ROOT_USER}
  rootPassword: ${ROOT_PASSWORD}
  mode: standalone
  persistence:
    enabled: true
    size: 50Gi
  buckets:
    - name: loki-chunks
    - name: loki-ruler
    - name: loki-admin
  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 100m

chunksCache:
  enabled: false